# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# ============================================================

schema = "se-manifest-schema"
schema_version = "0.5.0"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/main/manifest-schema.toml"

# === Framework Context ===

[meta]
framework = "Structural Explainability"
framework_url = "https://github.com/structural-explainability"
purpose = "Declares this repository's role in the Structural Explainability ecosystem."

# === Repository Identity ===

[repository]
organization = "structural-explainability"
name = "paper-200-identity-regimes"
class = "paper"
kind = "paper"
status = "under-review"
since = "2026"
summary = "Paper deriving the referential-regime structure required by neutral substrates under persistent interpretive disagreement."

# === Layer Position ===

[layer]
space = "structural-explainability"
role = "justification-identity"

# === Dependency Declarations ===

[depends]
required = [
    { repository = "paper-100-neutral-substrate", kind = "semantic", reason = "Uses the neutral-substrate constraint and referential-regime framing introduced in SE-100." },
]
optional = []

# === Provided Artifacts ===

[provides]
artifacts = [
    "ANNOTATIONS.md",
    "CITATION.cff",
    "LICENSE",
    "README.md",
    "SE_MANIFEST.toml",
    "se200_identity_regimes.tex",
    "sections/*.tex",
    "bibliography/*.bib",
]

# === Scope ===

[scope]
includes = [
    "referential-regime structure for neutral substrates",
    "identity and persistence structure under persistent interpretive disagreement",
    "six-family lower-bound analysis before refinement",
    "transformation-driven refinement of enduring non-normative referents",
    "transformation-driven refinement of applicability contexts",
    "transformation-driven refinement of normative structures",
    "current lower bound of at least nine pairwise non-collapsing referential regimes",
    "representation and comparison consequences for neutral substrates",
    "boundary conditions for stable reference",
]
excludes = [
    "upper-bound claim for referential regimes",
    "completeness claim for all possible ontological systems",
    "normative specification text",
    "implementation requirements",
    "exchange or state-transition protocols",
    "verification tooling for accountable records",
]

# === Citation ===

[citation]
cff = "CITATION.cff"
preferred = "paper"

# === Traceability ===

[traceability]
identifier_map = "none"
