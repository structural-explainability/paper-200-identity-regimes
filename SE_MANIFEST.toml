# ============================================================
# SE_MANIFEST.toml (Repository Intent, Scope, and Role)
# ============================================================

schema = "se-manifest-1"
schema_url = "https://github.com/structural-explainability/spec-se/blob/main/manifests/se-manifest-1.md"

[meta]
# Non-normative contextual information
framework = "Structural Explainability"
framework_url = "https://github.com/structural-explainability"
framework_note = "Provides definitions and conventions for SE_MANIFEST semantics."
description = "Declarative claim of repository intent, scope, and role."
purpose = "To make explicit the boundaries, responsibilities, and expectations of this repository relative to others."

[repo]
name = "paper-200-identity-regimes"
org  = "structural-explainability"
kind = "paper"
status = "under-review"
since = "2026"
summary = "Applied ontology paper establishing a tight structural bound of six identity-and-persistence regimes required for neutral substrates under persistent disagreement."

[layer]
space = "SE"
role  = "justification-identity"

[result]
type = "structural-bound"
bound = 6
object = "identity-and-persistence regimes"

[depends]
required = []
optional = []

[provides]
artifacts = [
    "ANNOTATIONS.md",
    "CITATION.cff",
    "LICENSE",
    "README.md",
    "SE_MANIFEST.toml",
    "paper/*.tex",
    "glossary/*.tex"
]

[scope]
includes = [
  "structural analysis of identity and persistence regimes",
  "necessity proof establishing a lower bound on regime structure",
  "sufficiency construction realizing the minimal regime basis",
]
excludes = [
  "normative specification text",
  "implementation requirements",
  "exchange or state-transition protocols",
]

[citation]
cff = "CITATION.cff"
preferred = "paper"
bib_hint = "case2026identity"

[traceability]
identifier_map = "none"
