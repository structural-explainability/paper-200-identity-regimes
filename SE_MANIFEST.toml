# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# ============================================================

schema = "se-manifest-schema"
schema_version = "0.5.0"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/main/manifest-schema.toml"

# === Framework Context ===

[meta]
framework = "Structural Explainability"
framework_url = "https://github.com/structural-explainability"
purpose = "Declares this repository's role in the Structural Explainability ecosystem."

# === Repository Identity ===

[repository]
organization = "structural-explainability"
name = "paper-200-identity-regimes"
class = "paper"
kind = "paper"
status = "draft"
since = "2026"
summary = "Paper deriving a nine-regime lower-bound core for neutral substrates under persistent interpretive disagreement."

# === Layer Position ===

[layer]
space = "structural-explainability"
role = "justification-identity"

# === Dependency Declarations ===

[depends]
required = [
    { repository = "paper-100-neutral-substrate", kind = "semantic", reason = "Uses the neutral-substrate constraint developed in Neutral Substrates." },
]
optional = []

# === Provided Artifacts ===

[provides]
artifacts = [
    "ANNOTATIONS.md",
    "CITATION.cff",
    "LICENSE",
    "README.md",
    "SE_MANIFEST.toml",
    "se200_referential_regimes.tex",
    "sections/*.tex",
    "bibliography/*.bib",
]

# === Scope ===

[scope]
includes = [
    "referential-regime structure for neutral substrates",
    "identity and persistence under persistent interpretive disagreement",
    "six required reference kinds for accountability analysis",
    "carrier-basis pairs required by the lower-bound construction",
    "locus-fixed and object-fixed identity for plain referents",
    "extension-fixed and structure-fixed identity for scopes",
    "content-fixed and structure-fixed identity for rules",
    "nine-regime lower-bound core",
    "transformation-invariant identity regimes",
    "boundary conditions for stable reference",
]
excludes = [
    "upper-bound claim for identity regimes",
    "completeness claim for all admissible identity bases",
    "completeness claim for all possible ontological systems",
    "normative specification text",
    "implementation requirements",
    "exchange or state-transition protocols",
    "verification tooling for accountable records",
]

# === Citation ===

[citation]
cff = "CITATION.cff"
preferred = "paper"

# === Traceability ===

[traceability]
identifier_map = "none"
